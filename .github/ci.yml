name: Validacion Build

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validar configuracion
        uses: docker/build-push-action@v7
        with:
          context: .
          call: check